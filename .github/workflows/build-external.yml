name: Release deb package for Carbone.io Document generator

on: workflow_dispatch

jobs:
  BUILD:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v2
      - run: sudo apt install --reinstall gcc-12 g++-12
      - run: sudo apt-get install git build-essential zip ccache junit4 libkrb5-dev nasm graphviz python3 python3-dev qtbase5-dev libkf5coreaddons-dev libkf5i18n-dev libkf5config-dev libkf5windowsystem-dev libkf5kio-dev libqt5x11extras5-dev autoconf libcups2-dev libfontconfig1-dev gperf openjdk-17-jdk doxygen libxslt1-dev xsltproc libxml2-utils libxrandr-dev libx11-dev bison flex libgtk-3-dev ant ant-optional libnss3-dev libavahi-client-dev libxt-dev
      - run: CC=gcc-12 CXX=g++-12 ./autogen.sh --with-package-format=deb --enable-release-build --enable-mergelibs --enable-epm --enable-lto --enable-python=internal --enable-gen --enable-pch=full --without-system-headers --without-system-libs --without-help --without-myspell-dicts --without-java --without-doxygen --without-helppack-integration --without-junit --without-system-poppler --without-system-openssl --without-system-libpng --without-system-jpeg --without-system-jars --without-export-validation --without-krb5 --without-webdav --without-x  --disable-gtk3 --disable-gtk4 --disable-skia --disable-cairo-canvas --without-system-expat --without-system-libxml --without-system-xmlsec --without-system-libeot --without-system-librevenge --without-system-libepubgen --without-system-libwpd --without-system-libwpg --without-system-libwps --without-system-libvisio --without-system-libcdr --without-system-libmspub --without-system-libmwaw --without-system-libetonyek --without-system-libfreehand --without-system-libebook --without-system-libabw --without-system-libpagemaker --without-system-libqxp --without-system-libzmf --without-system-libstaroffice --without-system-libatomic_ops --without-system-libexttextcat --without-system-libnumbertext --without-system-libtiff --without-system-libwebp --with-system-dicts --with-system-zlib --with-linker-hash-style=both --with-fonts --with-external-thes-dir=/usr/share/mythes --with-external-hyph-dir=/usr/share/hyphen --with-external-dict-dir=/usr/share/hunspell --with-galleries=no --with-theme=breeze --with-vendor=Carbone.io --disable-community-flavor --disable-avahi --disable-dbus --disable-extension-integration --disable-extension-update --disable-odk --disable-gstreamer-1-0 --disable-evolution2 --disable-scripting-beanshell --disable-scripting-javascript --disable-ext-wiki-publisher --disable-dconf --disable-cups --disable-firebird-sdbc --disable-postgresql-sdbc --disable-mariadb-sdbc --disable-report-builder --disable-ldap --disable-librelogo --disable-libcmis --disable-cve-tests --disable-dbgutil --disable-sdremote --disable-sdremote-bluetooth --disable-online-update --disable-lpsolve --disable-lotuswordpro --disable-gui --disable-zxing --without-system-freetype --without-system-nss
      - run: CC=gcc-12 CXX=g++-12 make
